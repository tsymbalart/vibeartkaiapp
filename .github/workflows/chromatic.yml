name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      # Storybook 8 does not support Vite 7. Temporarily swap to Vite 6.
      - name: Pin Vite 6 for Storybook compatibility
        run: cd artifacts/app && npm pkg set devDependencies.vite="6.4.2" && cd ../.. && pnpm install --no-frozen-lockfile

      - name: Build Storybook
        working-directory: artifacts/app
        run: PORT=6006 BASE_PATH="/" npx storybook build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/app/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
